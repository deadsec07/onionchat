name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: onionchat
            asset_name: onionchat-linux-x86_64
          - os: macos-latest
            artifact_name: onionchat
            asset_name: onionchat-macos-x86_64
          - os: windows-latest
            artifact_name: onionchat.exe
            asset_name: onionchat-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test
      - name: Build release
        run: cargo build --release
      - name: Stage asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
